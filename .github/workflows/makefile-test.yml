# This workflow builds and runs the dl_timer test suite for the OpenMP and MPI tests defined in src/test/Makefile.

name: dl_timer build and test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install compilers and MPI
        run: >
          sudo apt-get update && sudo apt-get install -y build-essential gfortran
          libopenmpi-dev openmpi-bin

      - name: OpenMP tests
        run: |
          . compiler_setup/gnu_setup.sh
          make sm_test

      - name: Clean up OpenMP tests
        run: make allclean

      - name: MPI tests
        env:
        #GitHub runners have 2 cores, so we need to oversubscribe to run the MPI tests
          OMPI_MCA_rmaps_base_oversubscribe: "true"
        run: |
          . compiler_setup/gnu_setup.sh
          make dm_test
